version: '3.9'

services:
  app: 
    build: 
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    
    environment:
      MONGO_URL: mongodb://mongodb:27017/my_db

    depends_on:
      - mongodb

  mongodb: 
    image: mongo:8
    container_name: mongodb
    ports:
      - "27011:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
