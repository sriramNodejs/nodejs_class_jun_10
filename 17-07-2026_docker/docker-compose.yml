version: '3.9'

services:
  app: 
    image: sriramnodejsdev/my-node-app:1.0
    container_name: my-node-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - app-network
    
  mongodb: 
    image: mongo:8
    container_name: mongodb
    ports: 
      - "27012:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - app-network

volumes:
  mongodb-data:
networks:
  app-network:

    