version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_class_26_06_2026
    restart: unless-stopped
    ports:
      - "27013:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secretpassword
    volumes:
      - mongo_data:/data/db

volumes: 
  mongo_data: